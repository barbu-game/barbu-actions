name: Build and push image

# Reusable workflow (getout pattern): build a Docker image and push it to ghcr.io.
# Called by barbu-server and barbu-web release workflows.
on:
  workflow_call:
    inputs:
      image:
        description: Image name under ghcr.io/barbu-game (e.g. barbu-server).
        required: true
        type: string
      version:
        description: Semver tag to publish (no leading v).
        required: true
        type: string
      context:
        description: Build context path.
        required: false
        default: .
        type: string
      dockerfile:
        description: Path to the Dockerfile.
        required: false
        default: Dockerfile
        type: string
      build-args:
        description: Newline-separated build args (KEY=value).
        required: false
        default: ""
        type: string
      npm-auth:
        description: Whether to pass NPM_AUTH_TOKEN as a build secret (for private @barbu-game packages).
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ghcr.io/barbu-game/${{ inputs.image }}:${{ inputs.version }}
            ghcr.io/barbu-game/${{ inputs.image }}:latest
          build-args: ${{ inputs.build-args }}
          secrets: ${{ inputs.npm-auth && format('node_auth={0}', secrets.PACKAGES_READ_TOKEN) || '' }}
